name: Docker 构建和发布 (Premium)

on:
  push:
    branches:
      - main
  schedule:
    - cron: "13 5 * * *"
  workflow_dispatch:
    inputs:
      force_build:
        description: "强制构建（忽略版本检查）"
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录到 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 获取最新版本
        id: fetch-version
        run: |
          # 从上游 Docker Hub 获取最新版本号
          RESPONSE=$(wget -qO- https://hub.docker.com/v2/repositories/dushixiang/next-terminal/tags 2>/dev/null || echo "")
          if [ -z "$RESPONSE" ]; then
            echo "警告: 无法从 Docker Hub 获取版本信息"
          fi

          LATEST_VERSION=$(echo "$RESPONSE" | jq -r '.results[] | select(.name != "latest" and (.name | test("cache|rc|beta|alpha") | not)) | .name' | head -n1)
          CURRENT_VERSION=$(cat version 2>/dev/null || echo "0.0.0")

          echo "当前版本: $CURRENT_VERSION"
          echo "上游版本: ${LATEST_VERSION:-获取失败}"

          # 手动触发时支持强制构建
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.force_build }}" = "true" ]; then
            echo "检测到手动触发-强制构建"
            echo "skip_build=false" >> $GITHUB_OUTPUT
            echo "latest_version=${LATEST_VERSION:-$CURRENT_VERSION}" >> $GITHUB_OUTPUT
          elif [ -z "$LATEST_VERSION" ]; then
            echo "无法获取版本信息，跳过构建"
            echo "skip_build=true" >> $GITHUB_OUTPUT
          elif [ "$LATEST_VERSION" = "$CURRENT_VERSION" ]; then
            echo "版本无变化，跳过构建"
            echo "skip_build=true" >> $GITHUB_OUTPUT
          else
            echo "发现新版本: $LATEST_VERSION"
            echo "skip_build=false" >> $GITHUB_OUTPUT
            echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: 校验配置文件（不匹配则阻断构建）
        id: compare-config
        if: steps.fetch-version.outputs.skip_build == 'false'
        run: |
          LOCAL_FILE="sql/config.yaml"
          REMOTE_URL="https://f.typesafe.cn/next-terminal/config.yaml"

          # 下载远程配置
          if ! curl -sSf "$REMOTE_URL" -o /tmp/remote_config.yaml 2>/dev/null; then
            echo "⚠️ 警告: 无法获取远程配置文件，为了安全，阻断构建"
            echo "config_ok=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 严格比较
          if cmp -s "$LOCAL_FILE" /tmp/remote_config.yaml; then
            echo "配置文件与官方一致 ✅"
            echo "config_ok=true" >> $GITHUB_OUTPUT
          else
            echo "❌ 配置文件与官方不匹配！阻断构建"
            echo "config_ok=false" >> $GITHUB_OUTPUT
          fi

      - name: 构建并推送 Docker 镜像 (Premium)
        if: steps.fetch-version.outputs.skip_build == 'false' && steps.compare-config.outputs.config_ok == 'true'
        run: |
          LATEST_VERSION=${{ steps.fetch-version.outputs.latest_version }}
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          REPO="aaronlee/next-terminal-premium"

          echo "构建多架构镜像: linux/amd64, linux/arm64"
          echo "标签: latest, ${LATEST_VERSION}, ${LATEST_VERSION}-${TIMESTAMP}"

          docker buildx build --platform linux/amd64,linux/arm64 \
            -t ${REPO}:latest \
            -t ${REPO}:${LATEST_VERSION} \
            -t ${REPO}:${LATEST_VERSION}-${TIMESTAMP} \
            --push .

      - name: 更新仓库文件 (Version & Time)
        if: steps.fetch-version.outputs.skip_build == 'false' && steps.compare-config.outputs.config_ok == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

          LATEST_VERSION=${{ steps.fetch-version.outputs.latest_version }}

          # 更新版本号文件
          echo "$LATEST_VERSION" > version
          git add version

          # 更新时间戳
          current_time=$(TZ='Asia/Shanghai' date "+%Y-%m-%d %H:%M:%S")
          echo "$current_time" > time
          git add time

          git commit -m "镜像版本更新为 $LATEST_VERSION - 北京时间: $current_time" || echo "没有变更"
          git push origin main
