name: Docker 构建和发布 (Premium)

on:
  push:
    branches:
      - main
  schedule:
    - cron: "13 5 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v2

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: 登录到 Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 获取最新版本
        id: fetch-version
        run: |
          # 保留原有的 Docker Hub Tag 获取逻辑
          LATEST_VERSION=$(wget -qO- https://hub.docker.com/v2/repositories/dushixiang/next-terminal/tags | jq -r '.results[] | select(has("name") and .name != "latest" and (.name | test("cache") | not)) | .name' | head -n1)
          CURRENT_VERSION=$(cat version 2>/dev/null || echo "0.0.0")
          
          echo "LATEST_VERSION: $LATEST_VERSION"
          if [ "$LATEST_VERSION" = "$CURRENT_VERSION" ]; then
            echo "版本匹配，跳过构建。"
            echo "skip_build=true" >> $GITHUB_OUTPUT
          else
            echo "发现新版本: $LATEST_VERSION"
            echo "skip_build=false" >> $GITHUB_OUTPUT
            echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: 比较配置文件
        id: compare-config
        run: |
          LOCAL_FILE="sql/config.yaml"
          REMOTE_URL="https://f.typesafe.cn/next-terminal/config.yaml"
          
          curl -s $REMOTE_URL -o remote_config.yaml
          
          # 严格逻辑：一致才允许构建 (diff 返回 0 则 skip_build=false)
          if diff -qZ "$LOCAL_FILE" remote_config.yaml > /dev/null; then
            echo "配置文件验证通过，允许构建。"
            echo "skip_build=false" >> $GITHUB_OUTPUT
          else
            echo "配置文件与官方不匹配，为了安全拦截构建。"
            echo "skip_build=true" >> $GITHUB_OUTPUT
          fi

      - name: 构建并推送 Docker 镜像 (Premium)
        if: steps.fetch-version.outputs.skip_build == 'false' && steps.compare-config.outputs.skip_build == 'false'
        run: |
          LATEST_VERSION=${{ steps.fetch-version.outputs.latest_version }}
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          REPO="aaronlee/next-terminal-premium"
          
          docker buildx build --platform linux/amd64,linux/arm64 \
            -t ${REPO}:latest \
            -t ${REPO}:${LATEST_VERSION} \
            -t ${REPO}:${LATEST_VERSION}-${TIMESTAMP} \
            --push .

      - name: 更新仓库文件 (Version & Time) 并推送
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          
          # 判断是否成功构建并更新版本号
          if [[ "${{ steps.fetch-version.outputs.skip_build }}" == "false" && "${{ steps.compare-config.outputs.skip_build }}" == "false" ]]; then
            echo "${{ steps.fetch-version.outputs.latest_version }}" > version
            git add version
            COMMIT_MSG="镜像版本更新为 ${{ steps.fetch-version.outputs.latest_version }}"
          else
            COMMIT_MSG="Premium 运行记录更新"
          fi
          
          current_time=$(TZ='Asia/Shanghai' date "+%Y-%m-%d %H:%M:%S")
          echo "$current_time" > time
          git add time
          
          git commit -m "$COMMIT_MSG - 北京时间: $current_time" || echo "没有变更"
          git push origin main
